name: Release

# Builds the Linux AppImages (x86_64 + aarch64) and the Windows installer with
# sqgipkg, then publishes them as release assets.
#
# Everything is cross-built from a single x86_64 Ubuntu runner:
#   * Linux x86_64  - native build
#   * Linux aarch64 - cross-compiled (aarch64 toolchain + qemu-user-static)
#   * Windows x86_64 - cross-compiled (mingw-w64) and packaged with NSIS
#
# Push a tag like `v1.0.0` to cut a release, or run the workflow manually to
# produce build artifacts without publishing.

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  # appimagetool runs as an AppImage; GitHub runners cannot always mount FUSE,
  # so extract-and-run instead of mounting.
  APPIMAGE_EXTRACT_AND_RUN: '1'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout TelemStudio
        uses: actions/checkout@v4
        with:
          path: TelemStudio

      - name: Checkout sqgi (runtime + sqgipkg)
        uses: actions/checkout@v4
        with:
          repository: supercamel/sqgi
          ref: 3a561e5bc4429283c39380898133f747cc26206f
          path: sqgi

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config git file ca-certificates wget \
            meson valac gobject-introspection \
            libglib2.0-dev libgirepository1.0-dev libffi-dev libcairo2-dev libgtk-4-dev \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu qemu-user-static binfmt-support \
            mingw-w64 nsis squashfs-tools

      - name: Build and install sqgi
        run: |
          cmake -S sqgi -B sqgi/build -G Ninja -DCMAKE_BUILD_TYPE=Release -DSQ_ENABLE_JIT=ON
          cmake --build sqgi/build
          sudo cmake --install sqgi/build --prefix /usr/local
          sudo ldconfig

      - name: Build Linux x86_64 AppImage
        working-directory: TelemStudio
        run: sqgipkg --target appimage --appimage-arch x86_64 --sqgi-source-dir "$GITHUB_WORKSPACE/sqgi"

      - name: Build Linux aarch64 AppImage
        working-directory: TelemStudio
        run: sqgipkg --target appimage --appimage-arch aarch64 --sqgi-source-dir "$GITHUB_WORKSPACE/sqgi"

      - name: Build Windows installer
        working-directory: TelemStudio
        run: sqgipkg --target win-nsis --sqgi-source-dir "$GITHUB_WORKSPACE/sqgi"

      - name: Collect artifacts
        working-directory: TelemStudio
        run: |
          mkdir -p artifacts
          cp dist-linux-x86_64/TelemStudio.AppImage    artifacts/TelemStudio-x86_64.AppImage
          cp dist-linux-aarch64/TelemStudio.AppImage   artifacts/TelemStudio-aarch64.AppImage
          cp dist-windows-x86_64/TelemStudio-Setup.exe        artifacts/TelemStudio-Setup.exe
          ls -lh artifacts

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: telemstudio-builds
          path: TelemStudio/artifacts/*

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: TelemStudio
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" artifacts/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
          || gh release upload "$GITHUB_REF_NAME" artifacts/* \
            --repo "$GITHUB_REPOSITORY" --clobber
